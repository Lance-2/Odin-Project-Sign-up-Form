<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="styles.css" />
    <meta charset="UTF-8" />
    <title>Project Sign-up Form</title>
  </head>
  <body>
    <div class="container"><!-- The whole website page -->
      <div class="left-container">  <!-- Content for the left container -->
        <div class="transparent-box"> <!-- Container for Logo and text -->
           <img src="images/odin-lined.png" alt="Logo" class="logo" />
           <h1>Insert Amazing Title Here</h1>
        </div>
        <h2>Photo by <a href="https://unsplash.com/@haliewestphoto">Halie West</a> on <a href="https://unsplash.com/">Unsplash</a></h2>
      </div>
     
      <div class="right-container"> <!-- Content for the right container -->
        <div class="upper-part"> <!-- Upper part -->
          <p class="description">This is not a real online service! I am actively scamming you but sign up anyway! Help me realize my deepest dreams. Sign up now!</p>
          <p class="description">I know I want to.</p>
        </div> 
        <div class="middle-part"> <!-- Middle part -->
          <p class="mid_description">Lets go!</p>
          <form action = "" method = "POST">
            <div class = "left-side">
              <label for="first_name">First Name</label>
              <input type = "text" name = "first_name" placeholder = "First Name" required/>
              <label for="email">Email</label>
              <input type = "email" name = "email" placeholder = "Email" required/>
              <label for="password">Password</label>
              <input type = "password" name = "password" placeholder = "Password" required/>
            </div>
            <div class = "right-side">
              <label for="last_name">Last Name</label>
              <input type = "text" name = "last_name" placeholder = "Last Name" required/>
              <label for="phone_number">Phone Number</label>
              <input type="tel" name="phone_number" placeholder="Phone Number" pattern="[0-9]{10,15}" required />
              <label for="confirm_password">Confirm Password</label>
              <input type = "password" name = "confirm_password" placeholder = "Confirm Password" required/>
            </div>
          </form>
        </div> 
        <div class="lower-part"> <!-- Lower part -->
          <button type="submit">Create Account</button>
          <p>Already have an account? <a href="login.html">Log in</a></p>
        </div> 
      </div>
    </div>
  </body>
</html>
